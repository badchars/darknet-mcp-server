<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accent-light" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="50%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Icon glow (softer for light mode) -->
    <filter id="icon-glow-light">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Pill backgrounds -->
    <linearGradient id="lpill-red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#fff1f2"/>
    </linearGradient>
    <linearGradient id="lpill-orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fffbeb"/>
    </linearGradient>
    <linearGradient id="lpill-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#faf5ff"/>
    </linearGradient>
    <linearGradient id="lpill-violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="lpill-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="url(#bg-light)"/>

  <!-- Outer border -->
  <rect x="0.5" y="0.5" width="799" height="319" rx="0" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Grid lines -->
  <g stroke="#dc2626" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
  </g>

  <!-- Subtle glow orbs -->
  <circle cx="200" cy="140" r="120" fill="#dc2626" opacity="0.025"/>
  <circle cx="200" cy="140" r="70" fill="#dc2626" opacity="0.03"/>
  <circle cx="620" cy="160" r="100" fill="#7c3aed" opacity="0.025"/>
  <circle cx="620" cy="160" r="55" fill="#7c3aed" opacity="0.03"/>

  <!-- Top border accent -->
  <rect x="0" y="0" width="800" height="2" fill="url(#accent-light)"/>
  <!-- Bottom border accent -->
  <rect x="0" y="318" width="800" height="2" fill="url(#accent-light)"/>

  <!-- Shield with skull icon -->
  <g transform="translate(400, 80)" filter="url(#icon-glow-light)">
    <!-- Shield shape -->
    <path d="M0,-38 L-28,-24 L-28,4 C-28,22 -10,36 0,42 C10,36 28,22 28,4 L28,-24 Z"
          fill="none" stroke="url(#accent-light)" stroke-width="2.5" opacity="0.8"/>
    <!-- Skull -->
    <ellipse cx="0" cy="-8" rx="12" ry="14" fill="none" stroke="#dc2626" stroke-width="1.8" opacity="0.7"/>
    <!-- Eyes -->
    <ellipse cx="-5" cy="-11" rx="3" ry="3.5" fill="#dc2626" opacity="0.6"/>
    <ellipse cx="5" cy="-11" rx="3" ry="3.5" fill="#7c3aed" opacity="0.6"/>
    <!-- Nose -->
    <path d="M-1.5,-4 L0,-2 L1.5,-4" fill="none" stroke="#dc2626" stroke-width="1.2" opacity="0.5"/>
    <!-- Jaw -->
    <path d="M-7,2 L-7,6 L7,6 L7,2" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.5"/>
    <!-- Teeth -->
    <line x1="-3.5" y1="2" x2="-3.5" y2="6" stroke="#dc2626" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="2" x2="0" y2="6" stroke="#dc2626" stroke-width="1" opacity="0.4"/>
    <line x1="3.5" y1="2" x2="3.5" y2="6" stroke="#dc2626" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="400" y="152" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="28" font-weight="700" fill="#1e293b" letter-spacing="-0.5">darknet-mcp-server</text>

  <!-- Subtitle -->
  <text x="400" y="176" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#64748b" letter-spacing="0.5">Dark Web &amp; Threat Intelligence for AI Agents</text>

  <!-- Accent line -->
  <rect x="320" y="189" width="160" height="2" rx="1" fill="url(#accent-light)" opacity="0.5"/>

  <!-- Stats pills row -->
  <g transform="translate(400, 216)">
    <!-- 66 Tools (red) -->
    <g transform="translate(-210, 0)">
      <rect x="-38" y="-12" width="76" height="24" rx="12" fill="url(#lpill-red)" stroke="#fca5a5" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#dc2626">66 Tools</text>
    </g>
    <!-- 16 Sources (orange) -->
    <g transform="translate(-108, 0)">
      <rect x="-44" y="-12" width="88" height="24" rx="12" fill="url(#lpill-orange)" stroke="#fdba74" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#ea580c">16 Sources</text>
    </g>
    <!-- MCP (purple) -->
    <g transform="translate(-4, 0)">
      <rect x="-28" y="-12" width="56" height="24" rx="12" fill="url(#lpill-purple)" stroke="#c4b5fd" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#7c3aed">MCP</text>
    </g>
    <!-- CLI (violet) -->
    <g transform="translate(76, 0)">
      <rect x="-24" y="-12" width="48" height="24" rx="12" fill="url(#lpill-violet)" stroke="#c4b5fd" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#7c3aed">CLI</text>
    </g>
    <!-- Tor (green) -->
    <g transform="translate(152, 0)">
      <rect x="-24" y="-12" width="48" height="24" rx="12" fill="url(#lpill-green)" stroke="#86efac" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#16a34a">Tor</text>
    </g>
  </g>

  <!-- Source names -->
  <text x="400" y="260" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="9.5" fill="#94a3b8" letter-spacing="0.8">HIBP · ThreatFox · Tor · OTX · AbuseIPDB · Vulners · Blockchain · Hybrid Analysis</text>

  <!-- Decorative corner dots -->
  <circle cx="20" cy="20" r="1.5" fill="#dc2626" opacity="0.2"/>
  <circle cx="780" cy="20" r="1.5" fill="#7c3aed" opacity="0.2"/>
  <circle cx="20" cy="300" r="1.5" fill="#7c3aed" opacity="0.2"/>
  <circle cx="780" cy="300" r="1.5" fill="#dc2626" opacity="0.2"/>
</svg>